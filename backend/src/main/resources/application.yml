server:
  port: 8080

spring:
  application:
    name: luminex-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/luminex
    username: postgres
    password: password # TODO: Change in production
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
    google:
      gemini:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-1.5-pro

# Vector DB
vectordb:
  pinecone:
    api-key: ${PINECONE_API_KEY}
    environment: gcp-starter
    index-name: luminex-index
